name: CI Pipeline PIMS

on:
  push:
    branches: [ "main" ]
  pull_request:

env:
  # Force toutes les actions JS à utiliser Node.js 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    # 🔹 1. Récupérer le code
    - name: Checkout code
      uses: actions/checkout@v3

    # ───────── FRONTEND (Angular) ─────────
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 24  # passer à Node.js 24

    - name: Install dependencies (Angular)
      run: |
        cd front
        npm install

    - name: Build Angular app
      run: |
        cd front
        npm run build -- --configuration production

    # ───────── BACKEND (Spring Boot) ─────────
    - name: Setup Java 21
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: 21

    - name: Give execute permission to mvnw
      run: |
        cd pims-plateform
        chmod +x mvnw

    - name: Build Spring Boot  (skip tests)
      run: |
        cd pims-plateform
        ./mvnw clean install -DskipTests

    # ───────── SECURITY CHECK (BONUS 🔥) ─────────
    - name: Security audit
      run: npm audit || true