spring:
  application:
    name: pims-plateform

  datasource:
    url: jdbc:postgresql://localhost:5432/smsi_pims
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: PimsHikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

  task:
    scheduling:
      enabled: true
      
server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never
    include-exception: false

logging:
  level:
    root: WARN
    "[com.pims.plateform]": INFO
    "[org.springframework.security]": WARN
    "[org.hibernate.SQL]": WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/pims-plateform.log

jwt:
  secret: pims-smsi-iso27001-iso27701-secret-key-2026
  expiration: 86400000
  refresh-expiration: 604800000

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
app:
  upload:
    base-dir: C:/uploads
  cors:
    allowed-origins: "http://localhost:4200"